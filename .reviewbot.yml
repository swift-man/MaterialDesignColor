version: 1

review:
  include:
  - "**/*.swift"
  - "**/*.ts"
  - "**/*.js"
  - "**/*.py"
  - "**/*.rb"
  - "**/*.json"
  - "**/*.yml"
  - "**/*.yaml"
  - "Package.swift"
  - "README.md"
  - "CHANGELOG.md"
  - "LICENSE"
  - "packages/**/README.md"
  - "examples/**/README.md"
  - "packages/js/package.json"
  - "packages/js/tsconfig.json"
  - "packages/python/pyproject.toml"

  exclude:
  # dependency / build output
  - ".build/**"
  - ".swiftpm/xcode/**"
  - "DerivedData/**"
  - "build/**"
  - "**/build/**"
  - "dist/**"
  - "**/dist/**"
  - "node_modules/**"
  - "**/node_modules/**"
  - "vendor/**"
  - "__pycache__/**"
  - "**/__pycache__/**"
  - ".pytest_cache/**"
  - "**/.pytest_cache/**"
  - "*.egg-info/**"
  - "**/*.egg-info/**"
  - "Pods/**"
  - "Carthage/**"
  - "Carthage/Build/**"
  - "Dependencies/**"
  - ".accio/**"
  - "iOSInjectionProject/**"

  # generated source from tools/codegen/generate.rb
  - "packages/ios/Sources/MaterialDesignColorCore/MaterialDesignColor.swift"
  - "packages/ios/Sources/MaterialDesignColorSwiftUI/Color+MaterialDesignColor.swift"
  - "packages/ios/Sources/MaterialDesignColorUIKit/UIColor+MaterialDesignColor.swift"
  - "packages/js/src/colors.ts"
  - "packages/js/src/colorScheme.ts"
  - "packages/python/src/material_design_color/colors.py"
  - "packages/python/src/material_design_color/theme.py"
  - "**/Generated/**"
  - "**/*.generated.swift"
  - "**/*.pb.swift"
  - "**/*.graphql.swift"
  - "**/*+Generated.swift"

  # resources / binary assets
  - "**/*.xcassets/**"
  - "assets/**"
  - "**/*.png"
  - "**/*.jpg"
  - "**/*.jpeg"
  - "**/*.gif"
  - "**/*.webp"
  - "**/*.pdf"
  - "**/*.mp4"
  - "**/*.mov"

  # lock files / local package staging artifacts
  - "Package.resolved"
  - "Podfile.lock"
  - "package-lock.json"
  - "**/package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "poetry.lock"
  - "uv.lock"
  - "packages/js/LICENSE"

  # generated documentation output
  - "docs/**"
  - "**/*.doccarchive/**"
  - "**/*.docc/**"

  always_review:
  - ".reviewbot.yml"
  - ".coderabbit.yaml"
  - ".github/workflows/**"
  - ".gitignore"
  - "Package.swift"
  - "packages/js/package.json"
  - "packages/python/pyproject.toml"
  - "tools/codegen/generate.rb"
  - "tokens/**"
  - "README.md"
  - "CHANGELOG.md"
