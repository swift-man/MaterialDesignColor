name: Publish JS package to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Dist-tag to publish under (default: latest)"
        required: false
        default: "latest"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance
    defaults:
      run:
        working-directory: packages/js

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify package.json version matches release tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$RELEASE_TAG" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($RELEASE_TAG)"
            exit 1
          fi

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --tag "${TAG:-latest}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TAG: ${{ inputs.tag }}
