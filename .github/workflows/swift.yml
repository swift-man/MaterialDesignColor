name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  swift:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: "3.3"
    - uses: actions/setup-node@v4
      with:
        # Match the publish workflow (Node 24 / npm 11) so the smoke test
        # runs against the same runtime we'll publish from.
        node-version: "24"
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Verify generated sources
      run: ruby tools/codegen/generate.rb --check
    - name: Test Swift package
      run: swift test -v
    - name: Build and smoke-test JS package
      # Mirror the publish workflow's check + build + ESM smoke so that
      # packaging regressions (exports map, type: module, import paths)
      # surface at PR time instead of only at release time.
      working-directory: packages/js
      run: |
        npm install --ignore-scripts --no-package-lock
        npm run check
        npm run build
        npm run smoke
    - name: Test Python package
      run: |
        python3 -m pip install --upgrade pip pytest
        PYTHONPATH=packages/python/src python3 -m pytest packages/python/tests -v
